version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tunit-postgres
    environment:
      POSTGRES_DB: tunit
      POSTGRES_USER: tunit
      POSTGRES_PASSWORD: tunit123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:

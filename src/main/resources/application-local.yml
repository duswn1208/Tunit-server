            client-secret: ${NAVER_CLIENT_SECRET:P_p8w85Esw}
          kakao:
            client-id: ${KAKAO_CLIENT_ID:a12aad6b421acd6662e797a6343122ab}  # REST API 키
            client-secret: ${KAKAO_CLIENT_SECRET:ukSRNFVQulgUgG1iXifuCpjOUfg50nHa}  # 보안 > Client Secret
          google:

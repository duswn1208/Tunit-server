# Firebase (FCM): 서비스 계정 키(JSON)를 base64 인코딩해 환경변수로 주입
firebase:
  config:
    base64: ${FIREBASE_CONFIG_BASE64:}

# 배포 도메인. Render 환경변수로 실제 도메인 주입
service-url:
  web: ${SERVICE_URL_WEB:http://localhost:5173}
  server: ${SERVICE_URL_SERVER:http://localhost:8080}

server:
  # Render 가 주입하는 PORT 로 listen (로컬은 8080)
  port: ${PORT:8080}
  # 프록시(Render) 뒤에서 X-Forwarded-* 헤더로 https/도메인 인식 → OAuth redirect-uri 정상 생성
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      idle-timeout: 60000
      max-lifetime: 600000
      connection-timeout: 20000
      validation-timeout: 5000
      connection-test-query: SELECT 1
      pool-name: HikariPool
      auto-commit: true
      leak-detection-threshold: 30000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        enum:
          storage: STRING
        jdbc:
          lob:
            non_contextual_creation: true
          batch_size: 20
        format_sql: false
        query:
          plan_cache_max_size: 2048
          plan_parameter_metadata_max_size: 128
  security:
    oauth2:
      client:
        registration:
          # 네이버 로그인
          naver:
            client-id: ${NAVER_CLIENT_ID:YOUR_NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            client-name: Naver
            client-authentication-method: client_secret_post

          # 카카오 로그인
          kakao:
            client-id: ${KAKAO_CLIENT_ID:YOUR_KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope:
              - account_email
              - phone_number
              - name
            client-name: Kakao
            client-authentication-method: client_secret_post

          # 구글 로그인
          google:
            client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            scope:
              - profile
              - email
              - phone
            client-name: Google

          # 애플 로그인 (Sign in with Apple)
          apple:
            client-id: ${APPLE_CLIENT_ID:YOUR_APPLE_SERVICE_ID}
            client-secret: ${APPLE_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/apple"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            client-name: Apple
            client-authentication-method: client_secret_post
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            user-info-uri: https://appleid.apple.com/auth/userinfo
            jwk-set-uri: https://appleid.apple.com/auth/keys
            user-name-attribute: sub
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false
